<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>刷题宝 - 题库练习</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--hl:#e94560;--text:#eee;--sub:#aaa;
  --green:#00c853;--red:#ff5252;--orange:#ffab40;--blue:#448aff;
  --radius:12px;--shadow:0 4px 20px rgba(0,0,0,0.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.container{max-width:600px;margin:0 auto;padding:16px}
.screen{display:none}
.screen.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.header{text-align:center;padding:20px 0}
.header h1{font-size:24px;background:linear-gradient(135deg,var(--hl),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--sub);font-size:13px;margin-top:4px}

/* Stats Cards */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:32px;font-weight:bold}
.stat-card .num.green{color:var(--green)}.stat-card .num.blue{color:var(--blue)}.stat-card .num.orange{color:var(--orange)}.stat-card .num.red{color:var(--red)}
.stat-card .label{font-size:13px;color:var(--sub);margin-top:6px}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin:8px 0;transition:all .2s;text-align:center;text-decoration:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--hl);color:#fff}
.btn-secondary{background:var(--accent);color:var(--text)}
.btn-outline{border:2px solid var(--accent);background:transparent;color:var(--text)}
.btn-green{background:var(--green);color:#000}
.btn-sm{padding:8px 16px;font-size:14px;width:auto;display:inline-block;border-radius:8px}

/* Quiz */
.quiz-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.quiz-progress{height:6px;background:var(--accent);border-radius:3px;margin:12px 0;overflow:hidden}
.quiz-progress .fill{height:100%;background:var(--hl);border-radius:3px;transition:width .3s}
.timer{font-size:18px;font-weight:bold;color:var(--orange);font-variant-numeric:tabular-nums}
.timer.warning{color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{50%{opacity:0.5}}
.question-card{background:var(--card);border-radius:var(--radius);padding:24px;margin:16px 0;box-shadow:var(--shadow)}
.question-card .q-meta{display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;color:var(--sub)}
.question-card .q-type{background:var(--accent);padding:3px 10px;border-radius:20px;font-size:12px}
.question-card .q-text{font-size:17px;line-height:1.6;margin-bottom:20px}

/* Options */
.option{display:block;width:100%;padding:14px 16px;margin:8px 0;background:var(--accent);border:2px solid transparent;border-radius:var(--radius);color:var(--text);font-size:15px;text-align:left;cursor:pointer;transition:all .2s}
.option:active{transform:scale(0.98)}
.option.selected{border-color:var(--blue);background:#1a3a5e}
.option.correct{border-color:var(--green);background:#1a3a2e}
.option.wrong{border-color:var(--red);background:#3a1a1e}
.option:disabled{cursor:default;opacity:0.8}
.fill-input{width:100%;padding:14px;background:var(--accent);border:2px solid transparent;border-radius:var(--radius);color:var(--text);font-size:16px;outline:none}
.fill-input:focus{border-color:var(--blue)}
.feedback{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:12px;display:none}
.feedback.show{display:block;animation:fadeIn .3s}
.feedback.correct{border-left:4px solid var(--green)}
.feedback.wrong{border-left:4px solid var(--red)}
.feedback .exp{color:var(--sub);margin-top:8px;font-size:14px}

/* Result */
.result-summary{background:var(--card);border-radius:var(--radius);padding:30px;text-align:center;margin:20px 0;box-shadow:var(--shadow)}
.result-summary .score{font-size:64px;font-weight:bold}
.result-summary .grade{font-size:20px;margin:8px 0}
.detail-item{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 0;border-left:4px solid var(--accent)}
.detail-item.was-correct{border-left-color:var(--green)}
.detail-item.was-wrong{border-left-color:var(--red)}
.detail-item .d-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.detail-item .d-answer{font-size:14px;color:var(--sub)}

/* Wrong Book */
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.wrong-item{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 0;cursor:pointer;transition:all .2s}
.wrong-item:active{transform:scale(0.98)}

/* Stats */
.stats-section{margin:20px 0}
.stats-chart{background:var(--card);border-radius:var(--radius);padding:20px;margin:12px 0}
.bar-row{display:flex;align-items:center;margin:8px 0}
.bar-label{width:80px;font-size:13px;color:var(--sub);text-align:right;padding-right:12px;flex-shrink:0}
.bar-wrap{flex:1;height:24px;background:var(--accent);border-radius:12px;overflow:hidden}
.bar-fill{height:100%;border-radius:12px;transition:width .8s;min-width:4px}
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px}
.streak-day{aspect-ratio:1;border-radius:4px;background:var(--accent)}
.streak-day.done{background:var(--green)}
.streak-day.today{border:2px solid var(--hl)}

/* Category picker */
.cat-list{margin:12px 0}
.cat-item{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s;box-shadow:var(--shadow)}
.cat-item:active{transform:scale(0.98)}
.cat-item .cat-name{font-size:16px;font-weight:600}
.cat-item .cat-count{font-size:13px;color:var(--sub)}
.cat-item .cat-progress{width:60px;height:4px;background:var(--accent);border-radius:2px;margin-left:12px;overflow:hidden}
.cat-item .cat-progress .fill{height:100%;background:var(--green);border-radius:2px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:8px 0 12px;box-shadow:0 -4px 20px rgba(0,0,0,0.3);z-index:100}
.nav-item{text-align:center;cursor:pointer;padding:4px 12px;transition:all .2s;border:none;background:none;color:var(--sub);font-size:12px}
.nav-item.active{color:var(--hl)}
.nav-item .nav-icon{font-size:22px;display:block;margin-bottom:2px}

/* Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:var(--radius);padding:24px;width:90%;max-width:450px;max-height:80vh;overflow-y:auto}
.modal-content h2{margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1}

/* Import */
.import-area{border:2px dashed var(--accent);border-radius:var(--radius);padding:30px;text-align:center;cursor:pointer;margin:16px 0}
.import-area:hover{border-color:var(--hl)}
textarea{width:100%;height:150px;background:var(--accent);border:none;border-radius:var(--radius);color:var(--text);padding:12px;font-size:13px;resize:vertical;font-family:monospace}

/* Checkboxes */
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.checkbox-row input{width:18px;height:18px;accent-color:var(--hl)}

@media (max-width:400px){
  .stats-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:14px}
  .stat-card .num{font-size:24px}
  .question-card{padding:16px}
}
</style>
</head>
<body>

<div class="container">

<!-- ===== HOME SCREEN ===== -->
<div class="screen active" id="home">
  <div class="header">
    <h1>📚 刷题宝</h1>
    <div class="sub">题库在手，刷题无忧</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num blue" id="stat-total">0</div>
      <div class="label">题库总数</div>
    </div>
    <div class="stat-card">
      <div class="num green" id="stat-done">0</div>
      <div class="label">已完成</div>
    </div>
    <div class="stat-card">
      <div class="num orange" id="stat-rate">0%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-card">
      <div class="num red" id="stat-wrong">0</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="showCategoryPicker()">🎯 开始刷题</button>
  <button class="btn btn-primary" id="btn-resume" onclick="resumeQuiz()" style="display:none;background:var(--orange)">▶ 继续上次 <span id="resume-info"></span></button>
  <button class="btn btn-outline" onclick="startWrongBookQuiz()">📝 错题重练 <span id="home-wrong-count" style="color:var(--red)"></span></button>
  <button class="btn btn-secondary" onclick="showImportModal()">📥 导入题库</button>
  <div style="text-align:center;margin-top:8px">
    <span style="font-size:12px;color:var(--sub)">当前题库：<span id="current-bank-name">示例题库</span></span>
  </div>
</div>

<!-- ===== CATEGORY PICKER ===== -->
<div class="screen" id="category-picker">
  <div style="display:flex;align-items:center;gap:12px;margin:12px 0">
    <button class="btn btn-sm btn-outline" onclick="switchScreen('home')">← 返回</button>
    <h2 style="flex:1">选择分类</h2>
  </div>
  <div class="stats-row" style="grid-template-columns:1fr 1fr">
    <div class="stat-card" style="padding:12px">
      <div class="num" style="font-size:20px" id="cp-total"></div>
      <div class="label">可选题目</div>
    </div>
    <div class="stat-card" style="padding:12px">
      <div class="num" style="font-size:20px" id="cp-selected">0</div>
      <div class="label">已选题目</div>
    </div>
  </div>
  <div>
    <label class="checkbox-row" style="margin-bottom:12px">
      <input type="checkbox" id="select-all-cats" checked onchange="toggleAllCategories()">
      <span>全选分类</span>
    </label>
  </div>
  <div class="cat-list" id="cat-list"></div>
  <div style="margin-top:12px">
    <label style="font-size:13px;color:var(--sub)">答题数量（0=全部）</label>
    <input type="number" id="question-limit" value="0" min="0" style="width:100%;padding:10px;background:var(--accent);border:none;border-radius:8px;color:var(--text);font-size:16px;margin-top:4px">
  </div>
  <button class="btn btn-primary" onclick="startQuiz()">🚀 开始答题</button>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div class="screen" id="quiz">
  <div class="quiz-header">
    <button class="btn btn-sm btn-outline" onclick="confirmQuit()">✕ 退出</button>
    <span style="font-size:14px;color:var(--sub)"><span id="q-current">1</span>/<span id="q-total">0</span></span>
    <span class="timer" id="timer">00:00</span>
  </div>
  <div class="quiz-progress"><div class="fill" id="progress-bar" style="width:0%"></div></div>
  <div class="question-card" id="question-card"></div>
  <div class="feedback" id="feedback"></div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()" style="flex:1;display:none">上一题</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" style="flex:1">下一题</button>
    <button class="btn btn-green" id="btn-submit" onclick="submitQuiz()" style="flex:1;display:none">交卷</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div class="screen" id="result">
  <div class="result-summary">
    <div class="score" id="result-score" style="color:var(--green)">0</div>
    <div style="font-size:14px;color:var(--sub)">得分</div>
    <div class="grade" id="result-grade"></div>
    <div style="display:flex;justify-content:space-around;margin-top:16px;font-size:14px">
      <div>正确 <span style="color:var(--green);font-weight:bold" id="result-correct">0</span></div>
      <div>错误 <span style="color:var(--red);font-weight:bold" id="result-wrong">0</span></div>
      <div>用时 <span style="color:var(--orange);font-weight:bold" id="result-time">0</span></div>
    </div>
  </div>
  <h3 style="margin:12px 0">答题详情</h3>
  <div id="detail-list"></div>
  <button class="btn btn-primary" onclick="restartQuiz()">🔄 再来一次</button>
  <button class="btn btn-secondary" onclick="switchScreen('home')">🏠 返回首页</button>
</div>

<!-- ===== WRONG BOOK SCREEN ===== -->
<div class="screen" id="wrong-book">
  <div style="display:flex;align-items:center;gap:12px;margin:12px 0">
    <h2 style="flex:1">📝 错题本</h2>
    <button class="btn btn-sm btn-outline" onclick="clearWrongBook()" style="color:var(--red)">清空</button>
  </div>
  <div id="wrong-list"></div>
</div>

<!-- ===== STATS SCREEN ===== -->
<div class="screen" id="stats">
  <div style="margin:12px 0"><h2>📊 答题统计</h2></div>
  <div class="stats-chart" id="stats-content"></div>
</div>

</div><!-- container -->

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchScreen('home')" data-nav="home">
    <span class="nav-icon">🏠</span>首页
  </button>
  <button class="nav-item" onclick="switchScreen('wrong-book')" data-nav="wrong-book">
    <span class="nav-icon">📝</span>错题本
  </button>
  <button class="nav-item" onclick="switchScreen('stats')" data-nav="stats">
    <span class="nav-icon">📊</span>统计
  </button>
  <button class="nav-item" onclick="showImportModal()" data-nav="import">
    <span class="nav-icon">📥</span>导入
  </button>
</nav>

<!-- ===== IMPORT MODAL ===== -->
<div class="modal" id="import-modal">
  <div class="modal-content">
    <h2>📥 导入题库</h2>
    <p style="font-size:13px;color:var(--sub);margin-bottom:12px">粘贴题库JSON，或从文件选择</p>
    <textarea id="import-json" placeholder='粘贴题库JSON...'></textarea>
    <div class="import-area" onclick="document.getElementById('file-input').click()">
      📁 点击选择JSON文件
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileImport(event)">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
      <button class="btn btn-primary" onclick="importQuestions()">导入</button>
    </div>
    <div id="import-msg" style="margin-top:8px;font-size:13px"></div>
  </div>
</div>

<script>
// ==================== DATA LAYER ====================
const STORAGE_KEY = 'quiz_app_data';
const DEFAULT_BANK = '学校安全考试题库.json';

let questionBank = null;       // 当前题库
let quizQuestions = [];        // 本次答题的题目列表
let currentIndex = 0;         // 当前题号
let userAnswers = [];         // 用户答案
let confirmedSet = new Set(); // 已确认提交的题目索引
let timerInterval = null;
let timerSeconds = 0;
let quizStarted = false;

// ==================== STORAGE ====================
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : { progress: {}, wrongBook: [], stats: { daily: {} } };
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function getData() { return loadData(); }

// Session save/resume
function saveSession() {
  if (!quizStarted || quizQuestions.length === 0) return;
  const session = {
    bankName: questionBank ? questionBank.name : '',
    questionIds: quizQuestions.map(q => q.id),
    currentIndex: currentIndex,
    userAnswers: userAnswers,
    confirmedArr: Array.from(confirmedSet),
    timerSeconds: timerSeconds,
    total: quizQuestions.length
  };
  localStorage.setItem(STORAGE_KEY + '_session', JSON.stringify(session));
}
function loadSession() {
  const raw = localStorage.getItem(STORAGE_KEY + '_session');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}
function clearSession() { localStorage.removeItem(STORAGE_KEY + '_session'); }

// ==================== QUESTION BANK ====================
async function loadQuestionBank(source) {
  if (typeof source === 'string') {
    const resp = await fetch(source);
    return await resp.json();
  }
  return source; // already parsed JSON
}

function getQuestionById(id) {
  if (!questionBank) return null;
  for (const cat of questionBank.categories) {
    for (const q of cat.questions) {
      if (q.id === id) return q;
    }
  }
  return null;
}

function getAllQuestions() {
  if (!questionBank) return [];
  const all = [];
  for (const cat of questionBank.categories) {
    for (const q of cat.questions) {
      all.push({ ...q, category: cat.name });
    }
  }
  return all;
}

// ==================== SCREEN NAVIGATION ====================
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(name);
  if (target) target.classList.add('active');
  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`[data-nav="${name}"]`);
  if (navItem) navItem.classList.add('active');
  // Refresh data
  if (name === 'home') refreshHome();
  if (name === 'wrong-book') refreshWrongBook();
  if (name === 'stats') refreshStats();
}

// ==================== HOME ====================
function refreshHome() {
  const data = getData();
  const all = getAllQuestions();
  const total = all.length;
  const done = Object.keys(data.progress).length;
  let correct = 0;
  for (const [id, p] of Object.entries(data.progress)) {
    if (p.correct > 0) correct++;
  }
  const rate = done > 0 ? Math.round((correct / done) * 100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-rate').textContent = rate + '%';
  document.getElementById('stat-wrong').textContent = data.wrongBook.length;
  document.getElementById('home-wrong-count').textContent = data.wrongBook.length ? `(${data.wrongBook.length}题)` : '';
  document.getElementById('current-bank-name').textContent = questionBank ? questionBank.name : '未加载';

  // Show resume button if session exists
  const session = loadSession();
  const resumeBtn = document.getElementById('btn-resume');
  if (session && session.questionIds && session.questionIds.length > 0 &&
      session.currentIndex < session.questionIds.length) {
    const answered = session.confirmedArr ? session.confirmedArr.length : 0;
    resumeBtn.style.display = '';
    document.getElementById('resume-info').textContent =
      `（${session.currentIndex + 1}/${session.total}题，已答${answered}题，${Math.floor(session.timerSeconds / 60)}分${session.timerSeconds % 60}秒）`;
  } else {
    resumeBtn.style.display = 'none';
  }
}

// ==================== CATEGORY PICKER ====================
function showCategoryPicker() {
  switchScreen('category-picker');
  const catList = document.getElementById('cat-list');
  catList.innerHTML = '';
  let totalQ = 0;
  const data = getData();
  questionBank.categories.forEach((cat, i) => {
    totalQ += cat.questions.length;
    const done = cat.questions.filter(q => data.progress[q.id]?.correct).length;
    const pct = cat.questions.length > 0 ? Math.round((done / cat.questions.length) * 100) : 0;
    catList.innerHTML += `
      <label class="cat-item" style="cursor:pointer">
        <div style="flex:1">
          <input type="checkbox" class="cat-checkbox" data-index="${i}" checked onchange="updateCatSelection()" style="margin-right:12px">
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count">${cat.questions.length}题 · 正确率${pct}%</span>
        </div>
        <div class="cat-progress"><div class="fill" style="width:${pct}%"></div></div>
      </label>`;
  });
  document.getElementById('cp-total').textContent = totalQ;
  document.getElementById('cp-selected').textContent = totalQ;
}

function toggleAllCategories() {
  const checked = document.getElementById('select-all-cats').checked;
  document.querySelectorAll('.cat-checkbox').forEach(cb => cb.checked = checked);
  updateCatSelection();
}

function updateCatSelection() {
  let count = 0;
  document.querySelectorAll('.cat-checkbox').forEach(cb => {
    if (cb.checked) count += questionBank.categories[parseInt(cb.dataset.index)].questions.length;
  });
  document.getElementById('cp-selected').textContent = count;
}

// ==================== QUIZ LOGIC ====================
function resumeQuiz() {
  const session = loadSession();
  if (!session || !session.questionIds || session.questionIds.length === 0) {
    alert('没有可恢复的答题记录'); return;
  }
  const pool = session.questionIds.map(id => {
    const q = getQuestionById(id);
    return q || null;
  }).filter(Boolean);
  if (pool.length === 0) { alert('题库已变更，无法恢复'); clearSession(); return; }

  quizQuestions = pool;
  currentIndex = session.currentIndex || 0;
  userAnswers = session.userAnswers || new Array(pool.length).fill(null);
  confirmedSet = new Set(session.confirmedArr || []);
  timerSeconds = session.timerSeconds || 0;
  quizStarted = true;

  switchScreen('quiz');
  document.getElementById('q-total').textContent = pool.length;
  updateTimerDisplay();
  renderQuestion();
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
    if (timerSeconds > 600) document.getElementById('timer').classList.add('warning');
  }, 1000);
  if (currentIndex >= pool.length - 1) {
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('btn-submit').style.display = '';
  }
}

function startQuiz() {
  // Collect selected categories
  const selectedCats = [];
  document.querySelectorAll('.cat-checkbox').forEach(cb => {
    if (cb.checked) selectedCats.push(parseInt(cb.dataset.index));
  });
  if (selectedCats.length === 0) { alert('请至少选择一个分类'); return; }

  // Collect questions
  let pool = [];
  selectedCats.forEach(i => {
    questionBank.categories[i].questions.forEach(q => pool.push({ ...q, category: questionBank.categories[i].name }));
  });

  // Shuffle
  pool = shuffle(pool);

  // Limit
  const limit = parseInt(document.getElementById('question-limit').value) || 0;
  if (limit > 0 && limit < pool.length) pool = pool.slice(0, limit);

  quizQuestions = pool;
  currentIndex = 0;
  userAnswers = new Array(pool.length).fill(null);
  confirmedSet = new Set();
  timerSeconds = 0;
  quizStarted = true;

  switchScreen('quiz');
  document.getElementById('q-total').textContent = pool.length;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').textContent = '下一题';
  renderQuestion();
  startTimer();
}

function startWrongBookQuiz() {
  const data = getData();
  if (data.wrongBook.length === 0) { alert('错题本为空！'); return; }
  const pool = data.wrongBook.map(id => {
    const q = getQuestionById(id);
    return q ? { ...q, category: '错题重练' } : null;
  }).filter(Boolean);
  quizQuestions = shuffle(pool);
  currentIndex = 0;
  userAnswers = new Array(pool.length).fill(null);
  confirmedSet = new Set();
  timerSeconds = 0;
  quizStarted = true;
  switchScreen('quiz');
  document.getElementById('q-total').textContent = pool.length;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').textContent = '下一题';
  renderQuestion();
  startTimer();
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  if (!q) return;
  document.getElementById('q-current').textContent = currentIndex + 1;
  document.getElementById('progress-bar').style.width = ((currentIndex + 1) / quizQuestions.length * 100) + '%';
  document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
  document.getElementById('btn-prev').style.display = currentIndex > 0 ? '' : 'none';
  document.getElementById('btn-next').style.display = '';
  document.getElementById('btn-submit').style.display = 'none';
  if (currentIndex === quizQuestions.length - 1) {
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('btn-submit').style.display = '';
  }

  const card = document.getElementById('question-card');
  const typeLabel = { single: '单选题', multi: '多选题', tf: '判断题', fill: '填空题' };
  const existingAnswer = userAnswers[currentIndex];

  const isConfirmed = confirmedSet.has(currentIndex);

  let html = `<div class="q-meta"><span>${q.category || ''}</span><span class="q-type">${typeLabel[q.type] || q.type}</span></div>`;
  html += `<div class="q-text">${currentIndex + 1}. ${q.question}</div>`;

  if (q.type === 'single' || q.type === 'multi') {
    q.options.forEach((opt, i) => {
      let cls = 'option';
      if (isConfirmed) {
        const userSel = Array.isArray(existingAnswer) ? existingAnswer : [existingAnswer];
        if (q.answer.includes(i) && userSel.includes(i)) cls += ' correct';
        else if (!q.answer.includes(i) && userSel.includes(i)) cls += ' wrong';
        else if (q.answer.includes(i)) cls += ' correct';
      } else if (q.type === 'single' && existingAnswer === i) {
        cls += ' selected';
      } else if (q.type === 'multi' && Array.isArray(existingAnswer) && existingAnswer.includes(i)) {
        cls += ' selected';
      }
      const disabled = isConfirmed ? 'disabled' : '';
      html += `<button class="${cls}" ${disabled} onclick="selectOption(${i})">${'ABCDEFGH'[i]}. ${opt}</button>`;
    });
    if (q.type === 'multi' && !isConfirmed) {
      html += `<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="confirmMulti()">确认多选答案</button>`;
    }
  } else if (q.type === 'tf') {
    ['正确 ✓', '错误 ✗'].forEach((opt, i) => {
      let cls = 'option';
      if (isConfirmed) {
        const isCorrectTF = q.answer[0] === i;
        if (existingAnswer === i && isCorrectTF) cls += ' correct';
        else if (existingAnswer === i && !isCorrectTF) cls += ' wrong';
        else if (isCorrectTF) cls += ' correct';
      }
      html += `<button class="${cls}" ${isConfirmed ? 'disabled' : ''} onclick="selectTF(${i})">${opt}</button>`;
    });
  } else if (q.type === 'fill') {
    const val = existingAnswer || '';
    html += `<input class="fill-input" type="text" id="fill-answer" placeholder="输入你的答案..." value="${escapeHtml(val)}" ${isConfirmed ? 'disabled' : ''}>`;
    if (!isConfirmed) {
      html += `<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="confirmFill()">提交答案</button>`;
    }
  }

  card.innerHTML = html;
}

function selectOption(idx) {
  const q = quizQuestions[currentIndex];
  if (q.type === 'single') {
    userAnswers[currentIndex] = idx;
    checkAnswer(idx);
    renderQuestion();
  } else if (q.type === 'multi') {
    if (!Array.isArray(userAnswers[currentIndex])) userAnswers[currentIndex] = [];
    const arr = userAnswers[currentIndex];
    const pos = arr.indexOf(idx);
    if (pos >= 0) arr.splice(pos, 1); else arr.push(idx);
    renderQuestion();
  }
}

function confirmMulti() {
  const q = quizQuestions[currentIndex];
  const ans = userAnswers[currentIndex] || [];
  confirmedSet.add(currentIndex);
  checkAnswerMulti(ans);
  renderQuestion();
}

function selectTF(idx) {
  userAnswers[currentIndex] = idx;
  checkAnswer(idx);
  renderQuestion();
}

function confirmFill() {
  const input = document.getElementById('fill-answer');
  if (!input) return;
  const val = input.value.trim();
  userAnswers[currentIndex] = val;
  checkAnswerFill(val);
  renderQuestion();
}

function checkAnswer(userAns) {
  const q = quizQuestions[currentIndex];
  confirmedSet.add(currentIndex);
  const correctAns = q.answer[0];
  const isCorrect = userAns === correctAns;
  showFeedback(isCorrect, q.explanation);
  saveProgress(q.id, isCorrect);
}

function checkAnswerMulti(userArr) {
  const q = quizQuestions[currentIndex];
  const correctSet = new Set(q.answer);
  const userSet = new Set(userArr);
  const isCorrect = correctSet.size === userSet.size && [...correctSet].every(v => userSet.has(v));
  showFeedback(isCorrect, q.explanation);
  saveProgress(q.id, isCorrect);
}

function checkAnswerFill(userVal) {
  const q = quizQuestions[currentIndex];
  confirmedSet.add(currentIndex);
  const isCorrect = q.answer.some(a => String(a).toLowerCase().trim() === userVal.toLowerCase().trim());
  showFeedback(isCorrect, q.explanation);
  saveProgress(q.id, isCorrect);
}

function showFeedback(isCorrect, explanation) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = `
    <strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</strong>
    ${explanation ? `<div class="exp">💡 ${explanation}</div>` : ''}
  `;
}

function saveProgress(qId, isCorrect) {
  const data = getData();
  if (!data.progress[qId]) data.progress[qId] = { attempts: 0, correct: 0, lastAttempt: null };
  data.progress[qId].attempts++;
  if (isCorrect) data.progress[qId].correct++;
  data.progress[qId].lastAttempt = new Date().toISOString();
  if (!isCorrect) {
    if (!data.wrongBook.includes(qId)) data.wrongBook.push(qId);
  } else {
    data.wrongBook = data.wrongBook.filter(id => id !== qId);
  }
  const today = new Date().toISOString().slice(0, 10);
  if (!data.stats.daily[today]) data.stats.daily[today] = { answered: 0, correct: 0 };
  data.stats.daily[today].answered++;
  if (isCorrect) data.stats.daily[today].correct++;
  saveData(data);
  saveSession();
}

function nextQuestion() {
  if (currentIndex < quizQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

function submitQuiz() {
  stopTimer();
  showResults();
}

function confirmQuit() {
  if (quizStarted && confirm('确定要退出吗？答题进度已自动保存。')) {
    stopTimer();
    switchScreen('home');
  }
}

// ==================== TIMER ====================
function startTimer() {
  stopTimer();
  timerSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const el = document.getElementById('timer');
  el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  if (timerSeconds > 600) el.classList.add('warning');
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + '分' + s + '秒';
}

// ==================== RESULTS ====================
function showResults() {
  clearSession(); // Quiz completed, remove saved session
  switchScreen('result');
  let correct = 0, wrong = 0;
  const detailList = document.getElementById('detail-list');
  detailList.innerHTML = '';

  quizQuestions.forEach((q, i) => {
    const userAns = userAnswers[i];
    let isCorrect = false;
    if (q.type === 'multi') {
      const cs = new Set(q.answer);
      const us = new Set(userAns || []);
      isCorrect = cs.size === us.size && [...cs].every(v => us.has(v));
    } else if (q.type === 'fill') {
      isCorrect = q.answer.some(a => String(a).toLowerCase().trim() === String(userAns || '').toLowerCase().trim());
    } else {
      isCorrect = userAns === q.answer[0];
    }
    if (isCorrect) correct++; else wrong++;

    let userDisplay = '';
    if (q.type === 'multi') {
      userDisplay = (userAns || []).map(i => 'ABCDEFGH'[i]).join(', ') || '未作答';
    } else if (q.type === 'fill') {
      userDisplay = userAns || '未作答';
    } else if (q.type === 'single' || q.type === 'tf') {
      userDisplay = userAns !== null && userAns !== undefined ? (q.options ? q.options[userAns] : (userAns === 0 ? '正确' : '错误')) : '未作答';
    }
    const correctDisplay = q.type === 'multi' ? q.answer.map(i => 'ABCDEFGH'[i]).join(', ') : (q.options ? q.options[q.answer[0]] : (q.answer[0] === 0 ? '正确' : '错误'));

    detailList.innerHTML += `
      <div class="detail-item ${isCorrect ? 'was-correct' : 'was-wrong'}">
        <div class="d-header">
          <strong>${i+1}. ${isCorrect ? '✅' : '❌'} ${q.question.slice(0, 40)}...</strong>
          <span style="font-size:12px;color:var(--sub)">${q.category}</span>
        </div>
        <div class="d-answer">你的答案：${userDisplay} | 正确答案：${correctDisplay}</div>
        ${q.explanation ? `<div class="d-answer" style="margin-top:4px">💡 ${q.explanation}</div>` : ''}
      </div>`;
  });

  const score = quizQuestions.length > 0 ? Math.round((correct / quizQuestions.length) * 100) : 0;
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-score').style.color = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('result-grade').textContent = score >= 90 ? '🌟 优秀' : score >= 70 ? '👍 良好' : score >= 50 ? '📖 加油' : '💪 继续努力';
  document.getElementById('result-correct').textContent = correct;
  document.getElementById('result-wrong').textContent = wrong;
  document.getElementById('result-time').textContent = formatTime(timerSeconds);
  quizStarted = false;
}

function restartQuiz() {
  userAnswers = new Array(quizQuestions.length).fill(null);
  confirmedSet = new Set();
  currentIndex = 0;
  timerSeconds = 0;
  quizStarted = true;
  switchScreen('quiz');
  document.getElementById('q-total').textContent = quizQuestions.length;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = '';
  document.getElementById('btn-next').textContent = '下一题';
  renderQuestion();
  startTimer();
}

// ==================== WRONG BOOK ====================
function refreshWrongBook() {
  const data = getData();
  const list = document.getElementById('wrong-list');
  if (data.wrongBook.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><div>错题本为空，继续保持！</div></div>`;
    return;
  }
  list.innerHTML = data.wrongBook.map(id => {
    const q = getQuestionById(id);
    if (!q) return '';
    return `<div class="wrong-item" onclick="showQuestionDetail('${id}')">
      <div style="font-weight:600">${q.question.slice(0, 50)}...</div>
      <div style="font-size:13px;color:var(--sub);margin-top:4px">${q.category || ''} · ${q.type}</div>
    </div>`;
  }).reverse().join('');
}

function showQuestionDetail(id) {
  const q = getQuestionById(id);
  if (!q) return;
  const correctDisplay = q.options ? q.options[q.answer[0]] : q.answer[0];
  alert(`题目：${q.question}\n\n正确答案：${correctDisplay}\n\n解析：${q.explanation || '无'}`);
}

function clearWrongBook() {
  if (confirm('确定清空错题本吗？此操作不可恢复。')) {
    const data = getData();
    data.wrongBook = [];
    saveData(data);
    refreshWrongBook();
  }
}

// ==================== STATS ====================
function refreshStats() {
  const data = getData();
  const all = getAllQuestions();
  let totalAnswered = 0, totalCorrect = 0;
  for (const p of Object.values(data.progress)) {
    totalAnswered += p.attempts;
    totalCorrect += p.correct;
  }
  const rate = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;

  // Daily streak (last 28 days)
  let streakHtml = '<div style="margin-bottom:16px">';
  streakHtml += `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>总答题次数</span><strong>${totalAnswered}</strong></div>`;
  streakHtml += `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>总正确次数</span><strong style="color:var(--green)">${totalCorrect}</strong></div>`;
  streakHtml += `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>综合正确率</span><strong style="color:var(--orange)">${rate}%</strong></div>`;
  streakHtml += '</div>';
  streakHtml += '<div style="font-size:13px;color:var(--sub);margin-bottom:8px">最近28天打卡</div><div class="streak-grid">';
  for (let i = 27; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const dayData = data.stats.daily[key];
    let cls = 'streak-day';
    if (dayData && dayData.answered > 0) cls += ' done';
    if (i === 0) cls += ' today';
    streakHtml += `<div class="${cls}" title="${key}: ${dayData ? dayData.answered + '题' : '0题'}"></div>`;
  }
  streakHtml += '</div>';

  // Per-category stats
  streakHtml += '<h4 style="margin-top:20px;margin-bottom:8px">各分类正确率</h4>';
  questionBank.categories.forEach(cat => {
    let answered = 0, correct = 0;
    cat.questions.forEach(q => {
      const p = data.progress[q.id];
      if (p) { answered += p.attempts; correct += p.correct; }
    });
    const cr = answered > 0 ? Math.round((correct / answered) * 100) : 0;
    streakHtml += `
      <div class="bar-row">
        <div class="bar-label">${cat.name}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${cr}%;background:${cr>=70?'var(--green)':cr>=40?'var(--orange)':'var(--red)'}"></div></div>
        <span style="font-size:12px;margin-left:8px;color:var(--sub);width:40px;text-align:right">${cr}%</span>
      </div>`;
  });
  document.getElementById('stats-content').innerHTML = streakHtml;
}

// ==================== IMPORT ====================
function showImportModal() {
  document.getElementById('import-modal').classList.add('show');
  document.getElementById('import-msg').textContent = '';
  document.getElementById('import-json').value = '';
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('show');
}

async function importQuestions() {
  const text = document.getElementById('import-json').value.trim();
  if (!text) { document.getElementById('import-msg').innerHTML = '<span style="color:var(--red)">请粘贴JSON或选择文件</span>'; return; }
  try {
    const json = JSON.parse(text);
    validateBank(json);
    questionBank = json;
    localStorage.setItem('quiz_custom_bank', JSON.stringify(json));
    document.getElementById('import-msg').innerHTML = `<span style="color:var(--green)">✅ 导入成功！题库「${json.name}」，共${json.categories.reduce((s,c) => s + c.questions.length, 0)}题</span>`;
    refreshHome();
    setTimeout(closeImportModal, 1500);
  } catch (e) {
    document.getElementById('import-msg').innerHTML = `<span style="color:var(--red)">❌ 格式错误：${e.message}</span>`;
  }
}

function validateBank(json) {
  if (!json.name) throw new Error('缺少题库名称(name)');
  if (!Array.isArray(json.categories)) throw new Error('缺少分类列表(categories)');
  json.categories.forEach((cat, ci) => {
    if (!cat.name) throw new Error(`分类${ci+1}缺少名称(name)`);
    if (!Array.isArray(cat.questions)) throw new Error(`分类「${cat.name}」缺少题目列表(questions)`);
    cat.questions.forEach((q, qi) => {
      if (!q.id) q.id = `${ci}_${qi}`;
      if (!q.type || !['single','multi','tf','fill'].includes(q.type)) throw new Error(`题目${q.id}的type无效，应为single/multi/tf/fill`);
      if (!q.question) throw new Error(`题目${q.id}缺少question`);
      if (!Array.isArray(q.answer)) throw new Error(`题目${q.id}的answer应为数组`);
    });
  });
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('import-json').value = e.target.result;
  };
  reader.readAsText(file);
}

// ==================== UTILS ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== INIT ====================
async function init() {
  // Try loading custom bank first, then default
  const customBank = localStorage.getItem('quiz_custom_bank');
  if (customBank) {
    try { questionBank = JSON.parse(customBank); } catch(e) {}
  }
  if (!questionBank) {
    questionBank = await loadQuestionBank(DEFAULT_BANK);
  }
  refreshHome();
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
